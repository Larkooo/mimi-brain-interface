<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mimi Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace; background: #0a0a0a; color: #e0e0e0; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #fff; display: flex; align-items: center; gap: 1rem; }
  h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
  .stat { display: flex; justify-content: space-between; padding: 0.35rem 0; border-bottom: 1px solid #1a1a1a; }
  .stat:last-child { border-bottom: none; }
  .stat-label { color: #666; }
  .stat-value { color: #fff; font-weight: 600; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.on { background: #22c55e; }
  .dot.off { background: #ef4444; }
  .query-box { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; color: #e0e0e0; font-family: inherit; font-size: 0.85rem; resize: vertical; min-height: 50px; }
  .query-box:focus { outline: none; border-color: #555; }
  input[type=text], select { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 0.45rem 0.7rem; color: #e0e0e0; font-family: inherit; font-size: 0.85rem; }
  input:focus, select:focus { outline: none; border-color: #555; }
  button { background: #222; border: 1px solid #333; border-radius: 6px; padding: 0.45rem 0.9rem; color: #e0e0e0; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
  button:hover { background: #333; }
  button.primary { background: #1a3a1a; border-color: #2a5a2a; }
  button.primary:hover { background: #2a4a2a; }
  button.danger { background: #3a1a1a; border-color: #5a2a2a; }
  button.danger:hover { background: #4a2a2a; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 0.5rem; }
  th { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #333; color: #888; }
  td { padding: 0.35rem 0.5rem; border-bottom: 1px solid #1a1a1a; }
  .empty { color: #555; font-style: italic; padding: 0.75rem 0; }
  .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .mt { margin-top: 0.5rem; }
  .mb { margin-bottom: 0.75rem; }
  .tag { display: inline-block; background: #1a2a1a; border: 1px solid #2a3a2a; border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.75rem; color: #6a9a6a; }
  .tag.off { background: #2a1a1a; border-color: #3a2a2a; color: #9a6a6a; }
  .channel-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid #1a1a1a; }
  .channel-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<h1>
  <span id="title">Mimi</span>
  <span id="session-badge"></span>
</h1>

<!-- Status Row -->
<div class="grid">
  <div class="card">
    <h2>Session</h2>
    <div id="session-content">Loading...</div>
    <div class="row mt">
      <button class="primary" onclick="launchSession()">Launch</button>
      <button class="danger" onclick="stopSession()">Stop</button>
    </div>
  </div>
  <div class="card">
    <h2>Brain</h2>
    <div id="brain-content">Loading...</div>
  </div>
  <div class="card">
    <h2>Memory</h2>
    <div id="memory-content">Loading...</div>
    <div class="mt">
      <button onclick="backup()">Backup</button>
    </div>
  </div>
</div>

<!-- Channels -->
<div class="card">
  <h2>Channels</h2>
  <div id="channels-content">Loading...</div>
  <div class="row mt">
    <select id="channel-type">
      <option value="telegram">Telegram</option>
      <option value="discord">Discord</option>
      <option value="imessage">iMessage</option>
    </select>
    <button class="primary" onclick="addChannel()">Add Channel</button>
  </div>
</div>

<!-- Entities -->
<div class="card">
  <h2>Entities</h2>
  <input type="text" id="search-input" placeholder="Search entities..." style="width: 100%; margin-bottom: 0.5rem;">
  <div id="entities-content">Loading...</div>
  <div class="row mt">
    <select id="entity-type">
      <option value="person">person</option>
      <option value="company">company</option>
      <option value="service">service</option>
      <option value="concept">concept</option>
      <option value="account">account</option>
      <option value="project">project</option>
    </select>
    <input type="text" id="entity-name" placeholder="Name">
    <input type="text" id="entity-props" placeholder='{"key":"val"}' value="{}">
    <button class="primary" onclick="addEntity()">Add</button>
  </div>
</div>

<!-- Query -->
<div class="card">
  <h2>Query Brain</h2>
  <textarea class="query-box" id="query-input" placeholder="SELECT * FROM entities LIMIT 10"></textarea>
  <div class="row mt">
    <button onclick="runQuery()">Run (Cmd+Enter)</button>
  </div>
  <div id="query-results" class="mt"></div>
</div>

<!-- Config -->
<div class="card">
  <h2>Config</h2>
  <textarea class="query-box" id="config-editor" style="min-height: 100px;"></textarea>
  <div class="row mt">
    <button class="primary" onclick="saveConfig()">Save</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

async function load() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();

    $('title').textContent = d.name;
    document.title = d.name + ' Dashboard';
    $('session-badge').innerHTML = d.session_running
      ? '<span class="tag">running</span>'
      : '<span class="tag off">stopped</span>';

    $('session-content').innerHTML = `
      <div class="stat"><span class="stat-label">Session</span><span class="stat-value"><span class="dot ${d.session_running?'on':'off'}"></span>${d.session_running?'Running':'Stopped'}</span></div>
      <div class="stat"><span class="stat-label">Claude</span><span class="stat-value">${d.claude_version||'?'}</span></div>
    `;

    const bs = d.brain_stats;
    let types = bs.entity_types.map(([t,c])=>`<div class="stat"><span class="stat-label">${t}</span><span class="stat-value">${c}</span></div>`).join('');
    $('brain-content').innerHTML = `
      <div class="stat"><span class="stat-label">Entities</span><span class="stat-value">${bs.entities}</span></div>
      <div class="stat"><span class="stat-label">Relationships</span><span class="stat-value">${bs.relationships}</span></div>
      <div class="stat"><span class="stat-label">Memory refs</span><span class="stat-value">${bs.memory_refs}</span></div>
      ${types}
    `;

    $('memory-content').innerHTML = `<div class="stat"><span class="stat-label">Files</span><span class="stat-value">${d.memory_files}</span></div>`;

    // Channels
    let ch = '';
    if (d.channels.length === 0) {
      ch = '<div class="empty">No channels configured</div>';
    } else {
      ch = d.channels.map(c => `
        <div class="channel-row">
          <span>${c.name} <span class="tag${c.enabled?'':' off'}">${c.enabled?'enabled':'disabled'}</span></span>
          <span class="row">
            <button onclick="toggleChannel('${c.name}')">${c.enabled?'Disable':'Enable'}</button>
            <button class="danger" onclick="removeChannel('${c.name}')">Remove</button>
          </span>
        </div>
      `).join('');
    }
    $('channels-content').innerHTML = ch;

    loadEntities();
  } catch(e) {
    $('session-content').innerHTML = '<div class="empty">Failed to connect</div>';
  }
}

async function loadEntities(query) {
  try {
    const url = query ? '/api/brain/search?q='+encodeURIComponent(query) : '/api/brain/entities';
    const res = await fetch(url);
    const entities = await res.json();
    if (entities.length === 0) {
      $('entities-content').innerHTML = `<div class="empty">${query ? 'No results' : 'No entities yet'}</div>`;
      return;
    }
    $('entities-content').innerHTML = `<table>
      <thead><tr><th>ID</th><th>Type</th><th>Name</th><th>Created</th></tr></thead>
      <tbody>${entities.map(e=>`<tr><td>${e.id}</td><td>${e.type}</td><td>${e.name}</td><td>${e.created_at}</td></tr>`).join('')}</tbody>
    </table>`;
  } catch(e) {
    $('entities-content').innerHTML = '<div class="empty">Failed to load</div>';
  }
}

// Search
let searchTimer;
$('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  searchTimer = setTimeout(() => loadEntities(q || null), 300);
});

// Session control
async function launchSession() {
  await fetch('/api/session/launch', {method:'POST'});
  setTimeout(load, 1000);
}
async function stopSession() {
  await fetch('/api/session/stop', {method:'POST'});
  setTimeout(load, 500);
}

// Channels
async function addChannel() {
  const type = $('channel-type').value;
  await fetch('/api/channels/add', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type})});
  load();
}
async function removeChannel(name) {
  await fetch('/api/channels/'+name, {method:'DELETE'});
  load();
}
async function toggleChannel(name) {
  await fetch('/api/channels/'+name+'/toggle', {method:'POST'});
  load();
}

// Brain
async function addEntity() {
  const type = $('entity-type').value;
  const name = $('entity-name').value.trim();
  const props = $('entity-props').value.trim();
  if (!name) return;
  await fetch('/api/brain/entities/add', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type, name, properties: props})});
  $('entity-name').value = '';
  load();
}

// Query
async function runQuery() {
  const sql = $('query-input').value.trim();
  if (!sql) return;
  try {
    const res = await fetch('/api/brain/query', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({sql})});
    if (!res.ok) { $('query-results').innerHTML = `<div class="empty">${await res.text()}</div>`; return; }
    const rows = await res.json();
    if (rows.length === 0) { $('query-results').innerHTML = '<div class="empty">(no results)</div>'; return; }
    const cols = rows[0].map(([k])=>k);
    $('query-results').innerHTML = `<table>
      <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${r.map(([,v])=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>`;
  } catch(e) { $('query-results').innerHTML = `<div class="empty">${e.message}</div>`; }
}
$('query-input').addEventListener('keydown', e => { if ((e.metaKey||e.ctrlKey) && e.key==='Enter') runQuery(); });

// Config
async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    const config = await res.json();
    $('config-editor').value = JSON.stringify(config, null, 2);
  } catch(e) {}
}
async function saveConfig() {
  try {
    const config = JSON.parse($('config-editor').value);
    await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config)});
    load();
  } catch(e) { alert('Invalid JSON'); }
}

// Backup
async function backup() {
  await fetch('/api/backup', {method:'POST'});
  alert('Backup created');
}

load();
loadConfig();
setInterval(load, 10000);
</script>
</body>
</html>
